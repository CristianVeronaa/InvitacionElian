<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Show de Elian</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Poppins:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --cream: #FFF8F0;
            --red: #E8736A;
            --red-deep: #C95A52;
            --gold: #F5C842;
            --blue: #7BB8D4;
            --mint: #8ECFB8;
            --lavender: #C4A8D8;
            --peach: #F5A97A;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #120a0a;
            font-family: 'Fredoka One', cursive;
            cursor: pointer;
        }

        /* Fondo del escenario */
        .stage-bg {
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse at 50% 110%, #3a1a1a 0%, #0e0606 60%, #080404 100%);
            z-index: 0;
        }

        .stage-stripes {
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(180deg,
                    rgba(255, 255, 255, 0.008) 0px, rgba(255, 255, 255, 0.008) 60px,
                    transparent 60px, transparent 120px);
        }

        /* Halo de luz del escenario desde el suelo */
        .stage-glow {
            position: fixed;
            bottom: -60px;
            left: 50%;
            transform: translateX(-50%);
            width: 600px;
            height: 300px;
            background: radial-gradient(ellipse, rgba(245, 200, 66, 0.18) 0%, transparent 70%);
            z-index: 2;
            pointer-events: none;
        }

        /* MARQUESINA */
        .marquee-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            background: var(--red);
            z-index: 100;
            display: flex;
            align-items: center;
            padding: 0 12px;
            border-bottom: 5px solid var(--gold);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        .bulb {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            flex-shrink: 0;
            margin: 0 7px;
            animation: blinkBulb 2s ease-in-out infinite;
        }

        .bulb.b-gold {
            background: var(--gold);
            box-shadow: 0 0 8px 3px rgba(245, 200, 66, 0.7);
        }

        .bulb.b-white {
            background: #fff;
            box-shadow: 0 0 8px 3px rgba(255, 255, 255, 0.6);
            animation-delay: .4s;
        }

        .bulb.b-peach {
            background: var(--peach);
            box-shadow: 0 0 8px 3px rgba(245, 169, 122, 0.6);
            animation-delay: .8s;
        }

        .bulb.b-blue {
            background: var(--blue);
            box-shadow: 0 0 8px 3px rgba(123, 184, 212, 0.6);
            animation-delay: 1.2s;
        }

        .bulb.b-mint {
            background: var(--mint);
            box-shadow: 0 0 8px 3px rgba(142, 207, 184, 0.5);
            animation-delay: 1.6s;
        }

        @keyframes blinkBulb {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: .3;
                transform: scale(.8);
            }
        }

        /* ESTRELLAS */
        .star-field {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
        }

        .st {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--d) ease-in-out infinite var(--dl);
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: .1
            }

            50% {
                opacity: .85
            }
        }

        /* CENEFA SCALLOP */
        .valance {
            position: fixed;
            top: 59px;
            left: 0;
            right: 0;
            z-index: 60;
            pointer-events: none;
            height: 88px;
        }

        .valance svg {
            width: 100%;
            height: 100%;
        }

        /* ARGOLLAS */
        .rings {
            position: fixed;
            top: 62px;
            display: flex;
            z-index: 70;
            pointer-events: none;
        }

        .rings-left {
            left: 0;
        }

        .rings-right {
            right: 0;
        }

        .ring {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 3.5px solid #b8860b;
            background: radial-gradient(circle at 35% 30%, #ffe680, #c49a1a);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.4);
            flex-shrink: 0;
        }

        /* TELONES */
        .scene {
            position: fixed;
            inset: 0;
            display: flex;
            z-index: 50;
        }

        .curtain {
            width: 50%;
            height: 100%;
            position: relative;
            overflow: hidden;
            transition: transform 1.7s cubic-bezier(0.86, 0, 0.07, 1);
        }

        .curtain-left {
            transform-origin: left center;
        }

        .curtain-right {
            transform-origin: right center;
        }

        .curtain-left .c-fabric {
            position: absolute;
            inset: 0;
            background-color: var(--red);
            background-image: repeating-linear-gradient(90deg,
                    rgba(0, 0, 0, 0.22) 0, transparent 14px,
                    rgba(255, 255, 255, 0.05) 28px, transparent 42px);
        }

        .curtain-right .c-fabric {
            position: absolute;
            inset: 0;
            background-color: var(--red-deep);
            background-image: repeating-linear-gradient(90deg,
                    transparent 0, rgba(255, 255, 255, 0.05) 14px,
                    transparent 28px, rgba(0, 0, 0, 0.22) 42px);
        }

        /* Franja dorada en el borde interno */
        .curtain-left .c-edge {
            position: absolute;
            top: 0;
            right: 0;
            width: 8px;
            height: 100%;
            background: linear-gradient(90deg, transparent, var(--gold));
        }

        .curtain-right .c-edge {
            position: absolute;
            top: 0;
            left: 0;
            width: 8px;
            height: 100%;
            background: linear-gradient(90deg, var(--gold), transparent);
        }

        /* ABIERTO */
        .scene.open .curtain-left {
            transform: scaleX(0);
        }

        .scene.open .curtain-right {
            transform: scaleX(0);
        }

        /* CENTRO */
        .center-stage {
            position: fixed;
            inset: 0;
            z-index: 80;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            padding-top: 80px;
            pointer-events: none;
        }

        .banner-svg {
            width: min(440px, 90vw);
            filter: drop-shadow(0 10px 28px rgba(0, 0, 0, 0.5));
        }

        .tap-hint {
            font-family: 'Poppins', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.45);
            animation: fadePulse 2.2s ease-in-out infinite;
        }

        @keyframes fadePulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: .3
            }
        }

        .tap-chevron {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            animation: chevBounce 1.4s ease-in-out infinite;
        }

        .tap-chevron::before,
        .tap-chevron::after {
            content: '';
            display: block;
            width: 14px;
            height: 14px;
            border-right: 2.5px solid rgba(255, 255, 255, 0.4);
            border-bottom: 2.5px solid rgba(255, 255, 255, 0.4);
            transform: rotate(45deg);
        }

        @keyframes chevBounce {

            0%,
            100% {
                transform: translateY(0)
            }

            50% {
                transform: translateY(7px)
            }
        }

        /* FOOTLIGHTS */
        .footlights {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: 50px;
            z-index: 90;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            pointer-events: none;
        }

        .fl {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            margin: 0 9px 10px;
            flex-shrink: 0;
            animation: blinkBulb 2.4s ease-in-out infinite;
        }

        .fl.f1 {
            background: #f8bbd0;
            box-shadow: 0 0 14px 5px rgba(248, 187, 208, .6);
        }

        .fl.f2 {
            background: #fff9c4;
            box-shadow: 0 0 14px 5px rgba(255, 249, 196, .6);
            animation-delay: .5s;
        }

        .fl.f3 {
            background: #b3e5fc;
            box-shadow: 0 0 14px 5px rgba(179, 229, 252, .6);
            animation-delay: 1s;
        }

        .fl.f4 {
            background: #dcedc8;
            box-shadow: 0 0 14px 5px rgba(220, 237, 200, .6);
            animation-delay: 1.5s;
        }

        .fl.f5 {
            background: #e1bee7;
            box-shadow: 0 0 14px 5px rgba(225, 190, 231, .6);
            animation-delay: .25s;
        }
    </style>
</head>

<body>

    <div class="stage-bg">
        <div class="stage-stripes"></div>
    </div>
    <div class="stage-glow"></div>
    <div class="star-field" id="starField"></div>

    <!-- Marquesina -->
    <div class="marquee-bar" id="marqueeBar"></div>

    <!-- Argollas -->
    <div class="rings rings-left" id="ringsLeft"></div>
    <div class="rings rings-right" id="ringsRight"></div>

    <!-- Cenefa scallop SVG -->
    <div class="valance">
        <svg viewBox="0 0 800 88" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="vg" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#E8736A" />
                    <stop offset="100%" stop-color="#C95A52" />
                </linearGradient>
            </defs>
            <path d="M0,0 Q50,78 100,0 Q150,78 200,0 Q250,78 300,0 Q350,78 400,0
                 Q450,78 500,0 Q550,78 600,0 Q650,78 700,0 Q750,78 800,0 L800,0 L0,0 Z" fill="url(#vg)" />
            <path d="M0,0 Q50,78 100,0 Q150,78 200,0 Q250,78 300,0 Q350,78 400,0
                 Q450,78 500,0 Q550,78 600,0 Q650,78 700,0 Q750,78 800,0" fill="none" stroke="#F5C842"
                stroke-width="2.5" opacity="0.9" />
            <!-- bolas en los picos -->
            <circle cx="100" cy="5" r="6.5" fill="#F5C842" />
            <circle cx="200" cy="5" r="6.5" fill="#F5C842" />
            <circle cx="300" cy="5" r="6.5" fill="#F5C842" />
            <circle cx="400" cy="5" r="6.5" fill="#F5C842" />
            <circle cx="500" cy="5" r="6.5" fill="#F5C842" />
            <circle cx="600" cy="5" r="6.5" fill="#F5C842" />
            <circle cx="700" cy="5" r="6.5" fill="#F5C842" />
            <!-- bolas en los valles (colores pastel) -->
            <circle cx="50" cy="63" r="5" fill="#F5A97A" />
            <circle cx="150" cy="63" r="5" fill="#8ECFB8" />
            <circle cx="250" cy="63" r="5" fill="#7BB8D4" />
            <circle cx="350" cy="63" r="5" fill="#C4A8D8" />
            <circle cx="450" cy="63" r="5" fill="#F5A97A" />
            <circle cx="550" cy="63" r="5" fill="#8ECFB8" />
            <circle cx="650" cy="63" r="5" fill="#7BB8D4" />
            <circle cx="750" cy="63" r="5" fill="#C4A8D8" />
        </svg>
    </div>

    <!-- Telón -->
    <div class="scene" id="scene">
        <div class="curtain curtain-left">
            <div class="c-fabric"></div>
            <div class="c-edge"></div>
        </div>
        <div class="curtain curtain-right">
            <div class="c-fabric"></div>
            <div class="c-edge"></div>
        </div>
    </div>

    <!-- Banner central -->
    <div class="center-stage">
        <svg class="banner-svg" viewBox="0 0 440 230" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#FFF8F0" />
                    <stop offset="100%" stop-color="#F5E6D0" />
                </linearGradient>
                <filter id="sh" x="-8%" y="-8%" width="116%" height="125%">
                    <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="rgba(0,0,0,0.4)" />
                </filter>
            </defs>
            <!-- picos superiores alternos -->
            <polygon points="0,70  40,22  80,70" fill="#E8736A" />
            <polygon points="80,70 120,22 160,70" fill="#F5C842" />
            <polygon points="160,70 200,22 240,70" fill="#7BB8D4" />
            <polygon points="240,70 280,22 320,70" fill="#8ECFB8" />
            <polygon points="320,70 360,22 400,70" fill="#C4A8D8" />
            <polygon points="400,70 440,22 480,70" fill="#F5A97A" />
            <!-- cuerpo del banner -->
            <rect x="0" y="64" width="440" height="162" rx="10" fill="url(#bg2)" filter="url(#sh)" />
            <rect x="0" y="64" width="440" height="162" rx="10" fill="none" stroke="#E8736A" stroke-width="3" />
            <rect x="10" y="74" width="420" height="142" rx="7" fill="none" stroke="#F5C842" stroke-width="1.5"
                stroke-dasharray="7,5" />
            <!-- texto -->
            <text x="220" y="144" text-anchor="middle" font-family="'Fredoka One',cursive" font-size="62" fill="#C95A52"
                letter-spacing="1">EL SHOW</text>
            <text x="220" y="192" text-anchor="middle" font-family="'Fredoka One',cursive" font-size="36" fill="#5A9AB8"
                letter-spacing="5">DE ELIAN</text>
            <!-- estrellitas decorativas -->
            <polygon points="28,96 31,86 34,96 44,96 36,102 39,112 31,106 23,112 26,102 18,96" fill="#F5C842"
                opacity="0.8" />
            <polygon points="412,96 415,86 418,96 428,96 420,102 423,112 415,106 407,112 410,102 402,96" fill="#F5C842"
                opacity="0.8" />
            <circle cx="220" cy="76" r="4" fill="#F5C842" opacity="0.6" />
        </svg>

        <p class="tap-hint">Toca para abrir el tel&oacute;n</p>
        <div class="tap-chevron"></div>
    </div>

    <!-- Footlights -->
    <div class="footlights" id="footlights"></div>

    <audio id="bg-music" loop>
        <source src="cancion.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Estrellas
        const sf = document.getElementById('starField');
        for (let i = 0; i < 70; i++) {
            const s = document.createElement('div');
            s.className = 'st';
            const sz = Math.random() * 2.5 + 0.8;
            s.style.cssText = `width:${sz}px;height:${sz}px;top:${Math.random() * 100}%;left:${Math.random() * 100}%;--d:${2 + Math.random() * 3}s;--dl:${Math.random() * 4}s`;
            sf.appendChild(s);
        }

        // Bombillas marquesina
        const bulbClasses = ['b-gold', 'b-white', 'b-peach', 'b-blue', 'b-mint'];
        const mb = document.getElementById('marqueeBar');
        for (let i = 0; i < 32; i++) {
            const b = document.createElement('div');
            b.className = `bulb ${bulbClasses[i % bulbClasses.length]}`;
            mb.appendChild(b);
        }

        // Argollas
        ['ringsLeft', 'ringsRight'].forEach(id => {
            const el = document.getElementById(id);
            for (let i = 0; i < 14; i++) {
                const r = document.createElement('div');
                r.className = 'ring';
                el.appendChild(r);
            }
        });

        // Footlights
        const flClasses = ['f1', 'f2', 'f3', 'f4', 'f5'];
        const fl = document.getElementById('footlights');
        for (let i = 0; i < 22; i++) {
            const b = document.createElement('div');
            b.className = `fl ${flClasses[i % flClasses.length]}`;
            fl.appendChild(b);
        }

        // Abrir telón
        document.body.addEventListener('click', () => {
            document.getElementById('scene').classList.add('open');
            document.getElementById('bg-music')?.play().catch(() => { });
            setTimeout(() => { window.location.href = 'invitacion.html'; }, 1800);
        });
    </script>
</body>

</html>
